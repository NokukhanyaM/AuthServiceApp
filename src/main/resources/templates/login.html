<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h3 class="text-center mb-4">🔐 Login</h3>

                <form th:action="@{/api/auth/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Email address" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="........" required autofocus>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Login</button>
                    <p class="text-center mt-3">Don't have an account?
                        <a th:href="@{https://userserviceapp-1.onrender.com/register}">Register</a>
                    </p>
                </form>

            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">

    let errorMessage = [[${error}]];

    if (errorMessage) {
        Toastify({
            text: errorMessage,
            duration: 3000,
            gravity: "top",
            position: "right",
            backgroundColor: "linear-gradient(to right, #ff5f6d, #ffc371)",
        }).showToast();
    }

    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);

        // Check if the URL contains '?logout'
        if (urlParams.has('logout')) {
            Toastify({
                text: "You have been successfully logged out!",
                duration: 4000,
                gravity: "top",
                position: "right",
                style: {
                    background: "linear-gradient(to right, #00b09b, #96c93d)"
                }
            }).showToast();

            // Clean the URL so the toast doesn't pop up again on refresh
            window.history.replaceState({}, document.title, window.location.pathname);
        }

    });

</script>

</body>
</html>
